apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hello-db.appName" . }}
  labels:
    {{- include "hello-db.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "hello-db.labels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- if .Values.app.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ .Values.app.topologySpread.maxSkew }}
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ .Values.app.topologySpread.whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
              app.kubernetes.io/component: app
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.registry }}/{{ .Values.image.app.repository }}:{{ .Values.image.app.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DB_HOST
              value: {{ include "hello-db.dbHost" . | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            {{- if .Values.postgres.ha.enabled }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "hello-db.dbSecret" . }}
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hello-db.dbSecret" . }}
                  key: password
            {{- else }}
            - name: DB_USER
              value: {{ .Values.postgres.username | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hello-db.dbSecret" . }}
                  key: POSTGRES_PASSWORD
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
